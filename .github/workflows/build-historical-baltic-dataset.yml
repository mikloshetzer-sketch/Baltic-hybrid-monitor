name: Build Historical Baltic Dataset

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Number of historical days to generate"
        required: true
        default: "14"
      rolling_days:
        description: "Rolling window used for each daily snapshot"
        required: true
        default: "14"

permissions:
  contents: write

jobs:
  build-historical-baltic-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build historical Baltic dataset
        run: |
          python scripts/build_historical_baltic_dataset.py --days ${{ github.event.inputs.days }} --rolling-days ${{ github.event.inputs.rolling_days }}

      - name: Generate dashboard data
        run: |
          python scripts/generate_baltic_dashboard_data.py

      - name: Commit historical dataset
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/baltic_hybrid_history.json
          git add docs/data/baltic_hybrid_history.json
          git add docs/data/baltic_dashboard.json

          git commit -m "Build historical Baltic hybrid dataset" || echo "Nothing to commit"
          git push
