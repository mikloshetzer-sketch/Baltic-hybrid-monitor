name: Fetch Baltic Hybrid Threat News

on:
  workflow_dispatch:

  schedule:
    - cron: "20 5 * * *"

permissions:
  contents: write

jobs:
  fetch-baltic-hybrid-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Baltic hybrid news
        env:
          CEE_SECURITY_MAP_JSON_URL: ${{ secrets.CEE_SECURITY_MAP_JSON_URL }}
        run: |
          python scripts/fetch_baltic_hybrid_news.py

      - name: Score Baltic hybrid news
        run: |
          python scripts/score_baltic_hybrid_news.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/
          git add docs/data/

          git commit -m "Daily Baltic Hybrid Threat update" || echo "Nothing to commit"

          git push
