name: Fetch Baltic Hybrid Threat News

on:
  workflow_dispatch:

  schedule:
    - cron: "20 5 * * *"

permissions:
  contents: write

jobs:
  fetch-baltic-hybrid-news:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install reportlab

      - name: Check RSS sources
        run: |
          python scripts/check_baltic_rss_sources.py

      - name: Fetch Baltic hybrid news
        env:
          CEE_SECURITY_MAP_JSON_URL: ${{ secrets.CEE_SECURITY_MAP_JSON_URL }}
        run: |
          python scripts/fetch_baltic_hybrid_news.py

      - name: Filter Baltic hybrid news
        run: |
          python scripts/filter_baltic_hybrid_news.py

      - name: Cluster Baltic hybrid events
        run: |
          python scripts/cluster_baltic_hybrid_events.py

      - name: Score Baltic hybrid news
        run: |
          python scripts/score_baltic_hybrid_news.py

      - name: Build historical Baltic dataset
        run: |
          python scripts/build_historical_baltic_dataset.py --days 14 --rolling-days 14

      - name: Generate dashboard data
        run: |
          python scripts/generate_baltic_dashboard_data.py

      - name: Generate daily PDF report
        run: |
          python scripts/generate_baltic_daily_report.py

      - name: Commit updated Baltic data and reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/baltic_rss_status.json
          git add docs/data/baltic_rss_status.json

          git add data/baltic_hybrid_raw_news.json
          git add docs/data/baltic_hybrid_raw_news.json

          git add data/baltic_hybrid_filtered_news.json
          git add docs/data/baltic_hybrid_filtered_news.json

          git add data/baltic_hybrid_clustered_events.json
          git add docs/data/baltic_hybrid_clustered_events.json

          git add data/baltic_hybrid_scored_news.json
          git add docs/data/baltic_hybrid_scored_news.json

          git add data/baltic_hybrid_history.json
          git add docs/data/baltic_hybrid_history.json

          git add docs/data/baltic_dashboard.json

          git add docs/reports/latest-baltic-hybrid-threat-report.pdf
          git add docs/reports/archive/*.pdf

          git commit -m "Update Baltic hybrid threat monitor data and daily report" || echo "Nothing to commit"
          git push
