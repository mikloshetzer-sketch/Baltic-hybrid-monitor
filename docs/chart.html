<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Baltic Hybrid Threat Monitor – Chart</title>

  <link rel="stylesheet" href="./css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      background: transparent;
    }

    .page-shell {
      width: 100%;
      margin: 0;
      padding: 0;
    }

    .chart-panel {
      margin: 0;
      box-shadow: none;
      border-radius: 10px;
    }

    .chart-container {
      min-height: 310px;
    }

    .chart-container canvas {
      height: 295px !important;
    }
  </style>
</head>

<body>
  <main class="page-shell">
    <section class="chart-panel">
      <div class="chart-panel-header">
        <div>
          <h2 id="chartTitle">Hybrid Threat Trend</h2>
          <p id="chartSubtitle">
            Compare the regional average with the monitored Baltic countries.
          </p>
        </div>
      </div>

      <div class="metric-controls" aria-label="Metric mode">
        <span class="control-title">Metric</span>

        <label>
          <input type="radio" name="metricMode" value="threat_index" checked />
          Threat Index
        </label>

        <label>
          <input type="radio" name="metricMode" value="daily_activity" />
          Event Activity
        </label>
      </div>

      <div class="view-controls" aria-label="View mode">
        <button class="mode-btn active" data-mode="daily">Daily</button>
        <button class="mode-btn" data-mode="ma7">7-Day Rolling Average</button>
        <button class="mode-btn" data-mode="ma14">14-Day Rolling Average</button>
        <button class="mode-btn" data-mode="trend">Regional Linear Trend</button>
      </div>

      <div class="chart-controls" id="chartControls">
        <label><input type="checkbox" value="overall" checked /> Regional Average</label>
        <label><input type="checkbox" value="Estonia" checked /> Estonia</label>
        <label><input type="checkbox" value="Latvia" checked /> Latvia</label>
        <label><input type="checkbox" value="Lithuania" checked /> Lithuania</label>
        <label><input type="checkbox" value="Poland" checked /> Poland</label>
        <label><input type="checkbox" value="Regional" /> Regional</label>
      </div>

      <div class="chart-container light-chart">
        <canvas id="threatTrendChart"></canvas>
      </div>

      <p class="method-note light-note" id="chartMethodNote">
        Each point represents the selected metric calculated for the displayed date.
      </p>
    </section>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/chart.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const dashboardData = await BalticAPI.loadDashboardData();
        BalticChart.initialize(dashboardData);
      } catch (error) {
        document.body.innerHTML = `
          <div style="font-family:Arial,sans-serif;padding:18px;border:1px solid #ef4444;border-radius:10px;background:#fff;color:#111827;">
            <strong>Chart loading error</strong>
            <pre style="white-space:pre-wrap;color:#b91c1c;">${error}</pre>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
